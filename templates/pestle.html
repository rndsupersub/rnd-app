{% extends "base.html" %}

{% block title %}Analisis PESTLE - R&D System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-globe"></i> Analisis PESTLE</h2>
</div>

<form method="POST" action="{{ url_for('routes.pestle') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="table-responsive">
        <table class="table table-bordered table-hover shadow">
            <thead>
                <tr class="text-center">
                    <th class="bg-primary text-white">POLITICAL</th>
                    <th class="bg-success text-white">ECONOMIC</th>
                    <th class="bg-warning text-dark">SOCIAL</th>
                    <th class="bg-info text-white">TECHNOLOGICAL</th>
                    <th class="bg-danger text-white">LEGAL</th>
                    <th class="bg-secondary text-white">ENVIRONMENTAL</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><textarea class="form-control" name="political" rows="4" placeholder="Faktor politik...">{{ pestle.political if pestle else '' }}</textarea></td>
                    <td><textarea class="form-control" name="economic" rows="4" placeholder="Faktor ekonomi...">{{ pestle.economic if pestle else '' }}</textarea></td>
                    <td><textarea class="form-control" name="social" rows="4" placeholder="Faktor sosial...">{{ pestle.social if pestle else '' }}</textarea></td>
                    <td><textarea class="form-control" name="technological" rows="4" placeholder="Faktor teknologi...">{{ pestle.technological if pestle else '' }}</textarea></td>
                    <td><textarea class="form-control" name="legal" rows="4" placeholder="Faktor hukum...">{{ pestle.legal if pestle else '' }}</textarea></td>
                    <td><textarea class="form-control" name="environmental" rows="4" placeholder="Faktor lingkungan...">{{ pestle.environmental if pestle else '' }}</textarea></td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="row mt-4">
        <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-save"></i> Simpan Analisis PESTLE
            </button>
        </div>
    </div>
</form>
{% endblock %}
