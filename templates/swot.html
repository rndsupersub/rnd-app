{% extends "base.html" %}

{% block title %}Analisis SWOT - R&D System{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-chess-board"></i> Analisis SWOT</h2>
</div>

<form method="POST" action="{{ url_for('routes.swot') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card h-100 border-success shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-check-circle"></i> STRENGTHS (Kekuatan)</h4>
                </div>
                <div class="card-body">
                    <textarea class="form-control" name="strengths" rows="6" placeholder="Masukkan kekuatan...">{{ swot.strengths if swot else '' }}</textarea>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100 border-danger shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-times-circle"></i> WEAKNESSES (Kelemahan)</h4>
                </div>
                <div class="card-body">
                    <textarea class="form-control" name="weaknesses" rows="6" placeholder="Masukkan kelemahan...">{{ swot.weaknesses if swot else '' }}</textarea>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100 border-info shadow">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0"><i class="fas fa-arrow-up"></i> OPPORTUNITIES (Peluang)</h4>
                </div>
                <div class="card-body">
                    <textarea class="form-control" name="opportunities" rows="6" placeholder="Masukkan peluang...">{{ swot.opportunities if swot else '' }}</textarea>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100 border-dark shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0"><i class="fas fa-arrow-down"></i> THREATS (Ancaman)</h4>
                </div>
                <div class="card-body">
                    <textarea class="form-control" name="threats" rows="6" placeholder="Masukkan ancaman...">{{ swot.threats if swot else '' }}</textarea>
                </div>
            </div>
        </div>
    </div>
    <div class="row mt-4">
        <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-save"></i> Simpan Analisis SWOT
            </button>
        </div>
    </div>
</form>
{% endblock %}
