{% extends "base.html" %}

{% block title %}Buat Proyek Baru - R&D System{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('routes.projects') }}" class="btn btn-secondary btn-sm">
        <i class="fas fa-arrow-left"></i> Kembali ke Daftar Proyek
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Buat Proyek Baru</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('routes.new_project') }}" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label">Nama Proyek <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="project_type" class="form-label">Tipe Proyek</label>
                                <select class="form-select" id="project_type" name="project_type">
                                    <option value="Main">Proyek Utama (Main)</option>
                                    <option value="Improvement">Proyek Perbaikan (Improvement)</option>
                                    <option value="Side">Proyek Sampingan (Side)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Deskripsi</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="start_date" class="form-label">Tanggal Mulai</label>
                                <input type="date" class="form-control" id="start_date" name="start_date">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="end_date" class="form-label">Tanggal Selesai</label>
                                <input type="date" class="form-control" id="end_date" name="end_date">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select" id="status" name="status">
                                    <option value="On Track">On Track</option>
                                    <option value="Delayed">Delayed</option>
                                    <option value="Completed">Completed</option>
                                    <option value="Canceled">Canceled</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="google_drive_link" class="form-label">Link Google Drive (Opsional)</label>
                        <input type="url" class="form-control" id="google_drive_link" name="google_drive_link" placeholder="https://drive.google.com/...">
                    </div>
                    
                    <div class="mb-3">
                        <label for="file" class="form-label">Upload File (PDF, Word, Excel - Opsional)</label>
                        <input type="file" class="form-control" id="file" name="file">
                        <small class="text-muted">Ekstensi yang diizinkan: .pdf, .docx, .xlsx, .doc, .xls</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Simpan Proyek
                    </button>
                    <a href="{{ url_for('routes.projects') }}" class="btn btn-secondary">Batal</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
